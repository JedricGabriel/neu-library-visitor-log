<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEU Library | Sign In</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
</head>
<body class="login-body-new">

  <div class="page-transition-overlay" id="page-overlay"></div>

  <div class="login-split">

    <div class="login-form-panel">
      <div class="login-form-inner">

        <div class="login-logo-top">
          <img src="images/neu-library-logo.png" alt="NEU Library Logo"/>
        </div>

        <div class="login-header-new">
          <h2>Welcome!</h2>
        </div>

        <div id="login-buttons">
          <div id="loading-msg" style="
            display:none; align-items:center; justify-content:center; gap:10px;
            background:linear-gradient(135deg,rgba(201,168,76,0.08),rgba(201,168,76,0.04));
            border:1px solid rgba(201,168,76,0.25); border-radius:40px;
            padding:10px 20px; font-size:0.85rem; font-weight:600;
            color:var(--text-muted); margin-bottom:16px;">
            <i class="fas fa-circle-notch fa-spin" style="color:var(--gold);"></i>
            Signing you in...
          </div>

          <div id="error-msg" class="alert alert-error hidden">
            <i class="fas fa-circle-exclamation"></i>
            <span id="error-text">An error occurred. Please try again.</span>
          </div>

          <button class="btn-login-main" id="google-btn" onclick="handleGoogleLogin()">
            <svg width="18" height="18" viewBox="0 0 48 48">
              <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
              <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
              <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
              <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
            </svg>
            Continue with Google
          </button>

          <div class="login-divider-new"><span>or</span></div>

          <button class="btn-login-secondary" onclick="handleSwitchAccount()">
            <i class="fas fa-arrows-rotate"></i>
            Switch / Use another account
          </button>

          <div class="login-hint-new">
            <i class="fas fa-circle-info"></i>
            Use your <strong>@neu.edu.ph</strong> Google account
          </div>
        </div>

        <div id="role-selector-wrap"></div>

      </div>
    </div>

    <div class="login-image-panel">
      <img src="images/neu-library-bg.jpg" alt="NEU Library" class="login-bg-img"/>
      <div class="login-image-content">
        <div class="login-image-badge">
          <i class="fas fa-book-open"></i> Library Visitor Log
        </div>
        <h2>New Era University</h2>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
